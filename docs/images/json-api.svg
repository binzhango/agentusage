<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">Agentusage local JSON API</title>
  <desc id="desc">HTTP endpoints for providers, summary metrics, and trend data return structured JSON.</desc>
  <rect width="1200" height="500" rx="18" fill="#181923"/>
  <g font-family="ui-monospace, monospace">
    <text x="42" y="55" fill="#f7f2f4" font-size="23" font-weight="700">Local JSON API</text>
    <text x="42" y="84" fill="#8b8b9e" font-size="15">http://127.0.0.1:8787</text>
    <rect x="40" y="112" width="360" height="338" rx="10" fill="#1e1f2b" stroke="#555568"/>
    <text x="66" y="154" fill="#8ed1c5" font-size="14" font-weight="700">GET</text><text x="116" y="154" fill="#ddd" font-size="15">/api/providers</text>
    <line x1="64" y1="174" x2="376" y2="174" stroke="#38394a"/>
    <text x="66" y="214" fill="#8ed1c5" font-size="14" font-weight="700">GET</text><text x="116" y="214" fill="#ddd" font-size="15">/api/summary</text>
    <text x="116" y="239" fill="#8b8b9e" font-size="12">?provider=codex&amp;window=7d</text>
    <line x1="64" y1="262" x2="376" y2="262" stroke="#38394a"/>
    <text x="66" y="302" fill="#8ed1c5" font-size="14" font-weight="700">GET</text><text x="116" y="302" fill="#ddd" font-size="15">/api/trend</text>
    <text x="116" y="327" fill="#8b8b9e" font-size="12">?provider=codex&amp;window=30d</text>
    <line x1="64" y1="350" x2="376" y2="350" stroke="#38394a"/>
    <text x="66" y="392" fill="#f6c177" font-size="14">SQLite / PostgreSQL</text>
    <text x="66" y="418" fill="#8b8b9e" font-size="12">No external service required</text>
    <rect x="430" y="112" width="730" height="338" rx="10" fill="#101118" stroke="#555568"/>
    <circle cx="458" cy="137" r="6" fill="#f28f8f"/><circle cx="478" cy="137" r="6" fill="#f6c177"/><circle cx="498" cy="137" r="6" fill="#8ed1c5"/>
    <g font-size="15"><text x="462" y="184" fill="#b9b9c8">{</text><text x="490" y="214" fill="#e9b4c9">"provider"</text><text x="592" y="214" fill="#b9b9c8">:</text><text x="610" y="214" fill="#8ed1c5">"codex"</text><text x="676" y="214" fill="#b9b9c8">,</text><text x="490" y="246" fill="#e9b4c9">"window"</text><text x="574" y="246" fill="#b9b9c8">:</text><text x="592" y="246" fill="#8ed1c5">"7d"</text><text x="628" y="246" fill="#b9b9c8">,</text><text x="490" y="278" fill="#e9b4c9">"total_tokens"</text><text x="626" y="278" fill="#b9b9c8">:</text><text x="644" y="278" fill="#f6c177">4821360</text><text x="712" y="278" fill="#b9b9c8">,</text><text x="490" y="310" fill="#e9b4c9">"requests"</text><text x="592" y="310" fill="#b9b9c8">:</text><text x="610" y="310" fill="#f6c177">247</text><text x="642" y="310" fill="#b9b9c8">,</text><text x="490" y="342" fill="#e9b4c9">"sessions"</text><text x="592" y="342" fill="#b9b9c8">:</text><text x="610" y="342" fill="#f6c177">29</text><text x="634" y="342" fill="#b9b9c8">,</text><text x="490" y="374" fill="#e9b4c9">"cost_usd"</text><text x="600" y="374" fill="#b9b9c8">:</text><text x="618" y="374" fill="#f6c177">8.15492</text><text x="462" y="406" fill="#b9b9c8">}</text></g>
  </g>
</svg>
